<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      max-width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Online Shop</h1>
  <p>Welcome to our store!</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</nav>

<div class="container" id="product-list">
</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

<script>
const products = [
  { 
    name: "T-Shirt", 
    price: 10, 
    image: "https://images.unsplash.com/photo-1593032465173-3e3a6e5a0d83?auto=format&fit=crop&w=400&q=80" 
  },
  { name: "Shoes", price: 25, image: "https://via.placeholder.com/200" },
  { name: "Watch", price: 50, image: "https://via.placeholder.com/200" }
];

  const productList = document.getElementById("product-list");

  products.forEach(product => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${product.image}" alt="${product.name}">
      <h3>${product.name}</h3>
      <p>$${product.price}</p>
      <button onclick="addToCart('${product.name}')">Add to Cart</button>
    `;

    productList.appendChild(div);
  });

  function addToCart(productName) {
    alert(productName + " added to cart!");
  }
</script>

</body>
</html>
